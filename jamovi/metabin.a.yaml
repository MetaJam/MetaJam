name: metaBin
title: Binary Outcomes Meta-Analysis
menuGroup: MetaJam
menuSubgroup: Two-Group Meta-Analysis
menuTitle: Binary Outcomes
menuSubtitle: Events, Total
version: "1.0.0"
jas: "1.2"

options:
  - name: data
    type: Data

  - name: studyLabel
    title: Study Label
    type: Variable
    suggested:
      - nominal
      - id
    permitted:
      - factor
      - id

  - name: eventE
    title: Events (Experimental)
    type: Variable
    suggested:
      - continuous
    permitted:
      - numeric

  - name: nE
    title: Total (Experimental)
    type: Variable
    suggested:
      - continuous
    permitted:
      - numeric

  - name: eventC
    title: Events (Control)
    type: Variable
    suggested:
      - continuous
    permitted:
      - numeric

  - name: nC
    title: Total (Control)
    type: Variable
    suggested:
      - continuous
    permitted:
      - numeric

  - name: sm
    title: Effect measure
    type: List
    options:
      - title: Risk ratio (RR)
        name: RR
      - title: Odds ratio (OR)
        name: OR
      - title: Risk difference (RD)
        name: RD
      - title: Diagnostic odds ratio (DOR)
        name: DOR
      - title: Vaccine efficacy/effectiveness (VE)
        name: VE
    default: RR

  - name: method
    title: Method
    type: List
    options:
      - title: Inverse variance
        name: Inverse
      - title: Mantel-Haenszel
        name: MH
      - title: Peto (OR/DOR only)
        name: Peto
      - title: Sample size weighting (OR/DOR only)
        name: SSW
    default: Inverse

  - name: correctionMethod
    title: Continuity correction
    type: List
    options:
      - title: No correction
        name: none
      - title: Only zero-cell studies
        name: only0
      - title: All studies if any zero cell
        name: if0all
      - title: All studies
        name: all
    default: only0

  - name: incr
    title: Increment
    type: Number
    min: 0
    default: 0.5

  - name: allstudies
    title: Include double-zero/all-event studies
    type: Bool
    default: false

  - name: model
    title: Model
    type: List
    options:
      - title: Random & common
        name: both
      - title: Random effects
        name: random
      - title: Common effect
        name: common
    default: both

  - name: methodTau
    title: Heterogeneity estimator
    type: List
    options:
      - title: Restricted maximum-likelihood
        name: REML
      - title: Paule-Mandel
        name: PM
      - title: DerSimonian-Laird
        name: DL
      - title: Maximum-likelihood
        name: ML
      - title: Hunter-Schmidt
        name: HS
      - title: Sidik-Jonkman
        name: SJ
      - title: Hedges
        name: HE
      - title: Empirical Bayes
        name: EB
    default: REML

  - name: methodRandomCi
    title: Random effects CI method
    type: List
    options:
      - title: Classic
        name: classic
      - title: Hartung-Knapp
        name: HK
    default: classic

  - name: prediction
    title: Prediction interval
    type: Bool
    default: false

  - name: confidenceLevel
    title: Confidence level
    type: Number
    min: 50
    max: 99.9
    default: 95

  - name: summary
    title: Summary
    type: Bool
    default: true

  - name: forestPlot
    title: Forest plot
    type: Bool
    default: true

  - name: forestMode
    title: ""
    type: List
    options:
      - title: General
        name: general
      - title: Dimensions
        name: dimensions
      - title: Rounding
        name: rounding
    default: general

  - name: forestLayout
    title: Theme
    type: List
    options:
      - title: Default
        name: meta
      - title: RevMan 5
        name: RevMan5
      - title: JAMA
        name: JAMA
      - title: BMJ
        name: BMJ
    default: meta

  - name: sortBy
    title: Sort by
    type: String
    default: none

  - name: sortDirection
    title: ""
    type: List
    options:
      - title: Ascending
        name: asc
      - title: Descending
        name: desc
    default: asc

  - name: sortVariable
    title: Sort variable
    type: Variable
    hidden: true
    permitted:
      - numeric
      - factor
      - id

  - name: forestTestOverall
    title: Overall effect test
    type: Bool
    default: false

  - name: forestDetails
    title: Analysis details
    type: Bool
    default: false

  - name: forestPrintI2Ci
    title: I² confidence interval
    type: Bool
    default: false

  - name: forestPrintTau2Ci
    title: Tau² confidence interval
    type: Bool
    default: false

  - name: labelE
    title: Experimental label
    type: String
    default: Experimental

  - name: labelC
    title: Control label
    type: String
    default: Control

  - name: labelLeft
    title: X-axis left label
    type: String
    default: ""

  - name: labelRight
    title: X-axis right label
    type: String
    default: ""

  - name: xlimCustom
    title: Custom x-axis range
    type: Bool
    default: false

  - name: xlimLower
    title: Minimum
    type: Number
    default: 0.1

  - name: xlimUpper
    title: Maximum
    type: Number
    default: 10

  - name: addrowsCustom
    title: Custom space above footnotes
    type: Bool
    default: false

  - name: addrowsBelowOverall
    title: ""
    type: Integer
    min: 0
    default: 0

  - name: colgap
    title: Space between columns
    type: Number
    min: 0
    default: 2

  - name: colgapUnit
    title: ""
    type: List
    options:
      - title: mm
        name: mm
      - title: cm
        name: cm
      - title: in
        name: inch
    default: mm

  - name: colgapForest
    title: Space around plot
    type: Number
    min: 0
    default: 2

  - name: colgapForestUnit
    title: ""
    type: List
    options:
      - title: mm
        name: mm
      - title: cm
        name: cm
      - title: in
        name: inch
    default: mm

  - name: digitsEffect
    title: Effect size & CI
    type: List
    options:
      - name: "0"
        title: "0"
      - name: "1"
        title: "1"
      - name: "2"
        title: "2"
      - name: "3"
        title: "3"
      - name: "4"
        title: "4"
      - name: "5"
        title: "5"
    default: "2"

  - name: digitsPval
    title: P-value
    type: List
    options:
      - name: "2"
        title: "2"
      - name: "3"
        title: "3"
      - name: "4"
        title: "4"
      - name: "5"
        title: "5"
    default: "4"

  - name: digitsWeight
    title: Weight
    type: List
    options:
      - name: "0"
        title: "0"
      - name: "1"
        title: "1"
      - name: "2"
        title: "2"
      - name: "3"
        title: "3"
      - name: "4"
        title: "4"
      - name: "5"
        title: "5"
    default: "1"

  - name: digitsI2
    title: I²
    type: List
    options:
      - name: "0"
        title: "0"
      - name: "1"
        title: "1"
      - name: "2"
        title: "2"
      - name: "3"
        title: "3"
      - name: "4"
        title: "4"
      - name: "5"
        title: "5"
    default: "1"

  - name: digitsTau2
    title: Tau²
    type: List
    options:
      - name: "0"
        title: "0"
      - name: "1"
        title: "1"
      - name: "2"
        title: "2"
      - name: "3"
        title: "3"
      - name: "4"
        title: "4"
      - name: "5"
        title: "5"
    default: "4"

  - name: subgroupVariables
    title: Subgroup Variables
    type: Variables
    suggested:
      - nominal
      - ordinal
    permitted:
      - factor

  - name: tauCommon
    title: Assume common Tau² across subgroups
    type: Bool
    default: false

  - name: predictionSubgroup
    title: Subgroup prediction interval
    type: Bool
    default: false

  - name: subgroupSummary
    title: Summary
    type: Bool
    default: true

  - name: subgroupForestPlot
    title: Forest plot
