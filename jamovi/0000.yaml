description: >-
  <b>MetaJam</b> is a comprehensive <b>meta</b>-analysis module for
  <b>jam</b>ovi, powered by the R package meta.<br><br> <b>Two-Group
  Meta-Analysis:</b> <ul> <li><b>Continuous Outcomes:</b> Analyze continuous
  outcome data using mean, standard deviation, and sample size.</li>
  <li><b>Binary Outcomes:</b> Analyze binary outcome data using event counts and
  sample size.</li> </ul> <b>Analysis Options:</b> Common-effect and
  random-effects models, subgroup analysis, meta-regression, leave-one-out
  analysis, cumulative meta-analysis, and publication bias.<br><br> <b>For
  documentation, tutorials, and support, please visit:</b> <a
  href="https://metajam.pages.dev" target="_blank">metajam.pages.dev</a><br><br>
  <small><i>* Note: This module is under active development. Additional analyses
  for diverse effect sizes and advanced meta-analytical extensions will be added
  in future updates.</i></small>
