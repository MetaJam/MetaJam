name: metaCont
title: Continuous Meta-Analysis
jus: "3.0"
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: studyLabel
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: meanE
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: sdE
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: nE
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: meanC
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: sdC
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: nC
            maxItemCount: 1
            isTarget: true

  - type: CollapseBox
    label: Meta-Analysis
    collapsed: false
    stretchFactor: 1
    children:
      - type: LayoutBox
        children:
          - type: ComboBox
            name: sm
      - type: LayoutBox
        children:
          - type: ComboBox
            name: methodSmd
            enable: (sm:smd)
      - type: LayoutBox
        children:
          - type: ComboBox
            name: model
      - type: LayoutBox
        children:
          - type: ComboBox
            name: methodTau
      - type: LayoutBox
        children:
          - type: ComboBox
            name: methodRandomCi
            enable: (!model:common)
      - type: CheckBox
        name: prediction
      - type: LayoutBox
        children:
          - type: TextBox
            name: confidenceLevel
            format: number
            width: normal
            suffix: "%"
      - type: CheckBox
        name: showSummary

  - type: CollapseBox
    label: Forest Plot
    collapsed: true
    stretchFactor: 1
    children:
      - type: CheckBox
        name: forestPlot
      - type: LayoutBox
        children:
          - type: ComboBox
            name: forestLayout
            enable: (forestPlot)
          - type: ComboBox
            name: sortBy
            enable: (forestPlot)
      - type: LayoutBox
        fitToGrid: true
        children:
          - type: TextBox
            name: labelE
            enable: (forestPlot)
            format: string
            width: large
            cell:
              row: 0
              column: 0
          - type: TextBox
            name: labelC
            enable: (forestPlot)
            format: string
            width: large
            cell:
              row: 0
              column: 1
          - type: TextBox
            name: labelLeft
            enable: (forestPlot)
            format: string
            width: large
            cell:
              row: 1
              column: 0
          - type: TextBox
            name: labelRight
            enable: (forestPlot)
            format: string
            width: large
            cell:
              row: 1
              column: 1
