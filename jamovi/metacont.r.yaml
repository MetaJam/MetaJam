name: metaCont
title: Continuous Meta-Analysis
jrs: "1.1"

items:
  - name: text
    type: Html
    visible: (showSummary)
    clearWith:
      - studyLabel
      - meanE
      - sdE
      - nE
      - meanC
      - sdC
      - nC
      - sm
      - methodSmd
      - model
      - methodTau
      - methodRandomCi
      - prediction
      - confidenceLevel
    refs:
      - metaPackage

  - name: plotSizeCache
    type: Group
    visible: false
    clearWith: []
    items: []

  - name: plot
    title: Overall Forest Plot
    type: Image
    renderFun: .forestPlot
    visible: (forestPlot)
    clearWith:
      - studyLabel
      - meanE
      - sdE
      - nE
      - meanC
      - sdC
      - nC
      - sm
      - methodSmd
      - model
      - methodTau
      - methodRandomCi
      - prediction
      - confidenceLevel
      - forestLayout
      - sortBy
      - labelE
      - labelC
      - labelLeft
      - labelRight
      - xlimCustom
      - xlimLower
      - xlimUpper
      - addrowsCustom
      - addrowsBelowOverall
      - colgap
      - colgapUnit
      - colgapForest
      - colgapForestUnit
      - forestTestOverall
      - forestDetails
      - forestPrintI2Ci
      - forestPrintTau2Ci
    refs:
      - metaPackage

  - name: subgroupText
    type: Html
    visible: (length(subgroupVariable) > 0 && showSubgroupSummary)
    clearWith:
      - studyLabel
      - meanE
      - sdE
      - nE
      - meanC
      - sdC
      - nC
      - sm
      - methodSmd
      - model
      - methodTau
      - methodRandomCi
      - prediction
      - confidenceLevel
      - subgroupVariable
      - tauCommon
      - predictionSubgroup
    refs:
      - metaPackage

  - name: subgroupPlotSizeCache
    type: Group
    visible: false
    clearWith: []
    items: []

  - name: subgroupPlot
    title: Subgroup Forest Plot
    type: Image
    renderFun: .subgroupForestPlot
    visible: (length(subgroupVariable) > 0 && subgroupForestPlot)
    clearWith:
      - studyLabel
      - meanE
      - sdE
      - nE
      - meanC
      - sdC
      - nC
      - sm
      - methodSmd
      - model
      - methodTau
      - methodRandomCi
      - prediction
      - confidenceLevel
      - subgroupVariable
      - tauCommon
      - predictionSubgroup
      - printSubgroupName
      - subgroupForestLayout
      - subgroupSortBy
      - subgroupLabelE
      - subgroupLabelC
      - subgroupLabelLeft
      - subgroupLabelRight
      - subgroupXlimCustom
      - subgroupXlimLower
      - subgroupXlimUpper
      - subgroupAddrowsCustom
      - subgroupAddrowsBelowOverall
      - subgroupColgap
      - subgroupColgapUnit
      - subgroupColgapForest
      - subgroupColgapForestUnit
      - subgroupForestTestSubgroup
      - subgroupForestTestEffect
      - subgroupForestTestOverall
      - subgroupForestPrintI2Ci
      - subgroupForestPrintTau2Ci
      - subgroupForestDetails
    refs:
      - metaPackage

  - name: metaRegModels
    title: ''
    type: Array
    hideHeadingOnlyChild: true
    clearWith:
      - studyLabel
      - meanE
      - sdE
      - nE
      - meanC
      - sdC
      - nC
      - sm
      - methodSmd
      - model
      - methodTau
      - methodRandomCi
      - prediction
      - confidenceLevel
      - metaRegCovs
      - metaRegFactors
      - metaRegBlocks
      - metaRegIntercept
    template:
      title: ''
      type: Group
      items:
        - name: metaRegText
          type: Html
          visible: (showMetaRegSummary && (length(metaRegCovs) > 0 || length(metaRegFactors) > 0))
          clearWith: []
          refs:
            - metaPackage

        - name: bubblePlot
          title: Bubble Plot
          type: Image
          width: 700
          height: 500
          renderFun: .bubblePlot
          visible: (bubblePlot && (length(metaRegCovs) > 0 || length(metaRegFactors) > 0))
          clearWith:
            - bubbleRegline
            - bubbleStudyLabel
          refs:
            - metaPackage

  - name: leaveOneOutText
    type: Html
    visible: (leaveOneOut && showLeaveOneOutSummary)
    clearWith:
      - studyLabel
      - meanE
      - sdE
      - nE
      - meanC
      - sdC
      - nC
      - sm
      - methodSmd
      - model
      - methodTau
      - methodRandomCi
      - prediction
      - confidenceLevel
      - leaveOneOutPrediction
    refs:
      - metaPackage

  - name: leaveOneOutPlotSizeCache
    type: Group
    visible: false
    clearWith: []
    items: []

  - name: leaveOneOutPlot
    title: Leave-One-Out Forest Plot
    type: Image
    renderFun: .leaveOneOutForestPlot
    visible: (leaveOneOut && leaveOneOutForestPlot)
    clearWith:
      - studyLabel
      - meanE
      - sdE
      - nE
      - meanC
      - sdC
      - nC
      - sm
      - methodSmd
      - model
      - methodTau
      - methodRandomCi
      - prediction
      - confidenceLevel
      - leaveOneOutPrediction
      - leaveOneOutForestLayout
      - leaveOneOutSortBy
      - leaveOneOutLabelLeft
      - leaveOneOutLabelRight
      - leaveOneOutXlimCustom
      - leaveOneOutXlimLower
      - leaveOneOutXlimUpper
      - leaveOneOutAddrowsCustom
      - leaveOneOutAddrowsBelowOverall
      - leaveOneOutColgap
      - leaveOneOutColgapUnit
      - leaveOneOutColgapForest
      - leaveOneOutColgapForestUnit
      - leaveOneOutForestDetails
    refs:
      - metaPackage

  - name: funnelPlotImage
    title: Funnel Plot
    type: Image
    width: 550
    height: 500
    renderFun: .funnelPlot
    visible: (funnelPlot)
    clearWith:
      - studyLabel
      - meanE
      - sdE
      - nE
      - meanC
      - sdC
      - nC
      - sm
      - methodSmd
      - model
      - methodTau
      - methodRandomCi
      - prediction
      - confidenceLevel
      - funnelStudyLabel
      - funnelContour
      - funnelLegend
      - funnelLegendPos
      - funnelLegendCex
    refs:
      - metaPackage

  - name: asymmetryTestText
    type: Html
    visible: (asymmetryTest && showAsymmetrySummary)
    clearWith:
      - studyLabel
      - meanE
      - sdE
      - nE
      - meanC
      - sdC
      - nC
      - sm
      - methodSmd
      - model
      - methodTau
      - methodRandomCi
      - prediction
      - confidenceLevel
      - asymmetryMethod
    refs:
      - metaPackage

  - name: asymmetryPlotImage
    title: Scatter Plot (Test for Funnel Plot Asymmetry)
    type: Image
    width: 550
    height: 500
    renderFun: .asymmetryPlot
    visible: (asymmetryTest && asymmetryPlot && asymmetryMethod != "Pustejovsky")
    clearWith:
      - studyLabel
      - meanE
      - sdE
      - nE
      - meanC
      - sdC
      - nC
      - sm
      - methodSmd
      - model
      - methodTau
      - methodRandomCi
      - prediction
      - confidenceLevel
      - asymmetryMethod
    refs:
      - metaPackage
